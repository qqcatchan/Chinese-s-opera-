name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Archive files
        run: tar czf deploy_package.tgz .

      - name: Copy to server
        run: |
          scp -o StrictHostKeyChecking=no deploy_package.tgz ${{ secrets.DEPLOY_TARGET }}:/tmp/

      - name: Run deploy commands on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_TARGET }} "cd /tmp && tar xzf deploy_package.tgz -C /tmp/deploy && cd /tmp/deploy && docker-compose up -d --build && docker-compose -f infra/docker-compose.full.yml up -d"
