version: '3.8'
services:
  signaling:
    build: ./backend/signaling
    ports:
      - "4000:4000"
    restart: unless-stopped
  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend/mobile-demo:/app
    command: sh -c "npm install && npm run start"
    ports:
      - "5173:5173"
    depends_on:
      - signaling
