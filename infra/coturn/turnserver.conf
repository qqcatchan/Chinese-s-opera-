# coturn minimal config
# Mount this file into the container at /etc/coturn/turnserver.conf
listening-port=3478
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=REPLACE_WITH_YOUR_SECRET
realm=example.com
total-quota=100
user-quota=50
cert=/etc/letsencrypt/live/DOMAIN/fullchain.pem
pkey=/etc/letsencrypt/live/DOMAIN/privkey.pem
no-multicast-peers
min-port=49152
max-port=65535
