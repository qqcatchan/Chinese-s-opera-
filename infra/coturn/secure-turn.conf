# secure-turn.conf
listening-port=3478
realm=example.com
fingerprint
use-auth-secret
static-auth-secret=REPLACE_WITH_STRONG_SECRET
lt-cred-mech
no-udp
no-cli
no-multicast-peers
max-allocate-lifetime=600
cert=/etc/letsencrypt/live/DOMAIN/fullchain.pem
pkey=/etc/letsencrypt/live/DOMAIN/privkey.pem
min-port=49152
max-port=65535
